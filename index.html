<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>碩享科技 - 經銷商業務大廳</title>
    <!-- 引入 React 18 穩定版、Babel 及 Tailwind CSS -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 隱藏滾動條，確保在 Google Sites 嵌入時視覺乾淨 */
        ::-webkit-scrollbar { display: none; }
        html, body { -ms-overflow-style: none; scrollbar-width: none; background-color: #f8fafc; }
    </style>
</head>
<body class="antialiased text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        // 產品規格對應簡報資料 (Slide 12 & 13)
        const LEASE_MODELS = [
            { id: 'combo', name: 'AIOT智慧型翻身排泄護理組 (整套)', price: 9700, desc: '輔助器EX + 全自動排泄處理機 (半年起租)' },
            { id: 'ex', name: 'AIOT智慧型翻身輔具-EX (智慧版)', price: 2500, desc: '操控主機、情境模式、自動設定翻身角度與時間、雲端聯網' },
            { id: 'ex_hardware', name: 'AIOT全自動排泄處理機 (單機)', price: 6500, desc: '自動感測、抽吸、溫水清洗、烘乾、UV殺菌除臭' },
            { id: 'e_plus', name: 'E+ 版本 (情境模式輔具)', price: 2000, desc: '獨家設計操控主機、定時翻身、角度自設' },
            { id: 'e_basic', name: 'E 版本 (基礎版輔具)', price: 3200, desc: '傳統手持遙控器、定時自動翻身、角度不可調' },
        ];

        const ADDON_OPTIONS = [
            { id: 'spo2', name: '4.3 血氧監測擴充', price: 100 },
            { id: 'vital', name: '4.3 生命體徵監測擴充', price: 100 },
            { id: 'temp_hum', name: '4.3 溫溼度感測警示', price: 100 },
            { id: 'radar', name: '4.3 雷達波體態偵測', price: 100 },
        ];

        const SALES_STAGES = [
            { value: '初次拜訪', color: 'bg-slate-100 text-slate-700 border-slate-200' },
            { value: '需求確認', color: 'bg-sky-50 text-sky-700 border-sky-200' },
            { value: '報價與展示', color: 'bg-purple-50 text-purple-700 border-purple-200' },
            { value: '獨佔/年約協商', color: 'bg-amber-50 text-amber-700 border-amber-200' },
            { value: '簽約結案', color: 'bg-emerald-50 text-emerald-700 border-emerald-200' },
        ];

        // ── 100% 穩定之內部 SVG 圖示庫，防止網路斷線導致圖示消失 ──
        const Icons = {
            Home: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>,
            Package: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>,
            Calculator: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>,
            CRM: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>,
            Monitor: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 002 2h2a2 2 0 002-2z"/></svg>,
            User: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>,
            UserMinus: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M13 7a4 4 0 11-8 0 4 4 0 018 0zM9 14a7 7 0 00-7 7h14a7 7 0 00-7-7zM21 12H15"/></svg>,
            TrendingDown: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M13 17h8m0 0V9m0 8l-8-8-4 4-6-6"/></svg>,
            CircleDollarSign: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1c-1.11 0-2.08-.402-2.599-1M12 14v1m-3-7C6.58 8 5 9.79 5 12s1.58 4 4 4h6c2.42 0 4-1.79 4-4s-1.58-4-4-4H9z"/></svg>,
            Exclamation: () => <svg className="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>,
            Check: () => <svg className="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/></svg>
        };

        function App() {
            const [activeTab, setActiveTab] = useState('home');
            const [calcMode, setCalcMode] = useState('lease');
            const [selectedModel, setSelectedModel] = useState('combo');
            const [buyoutPrice, setBuyoutPrice] = useState('55000');
            const [beds, setBeds] = useState('10');
            const [selectedAddons, setSelectedAddons] = useState(['spo2', 'temp_hum']);
            const [notes, setNotes] = useState([]);
            const [showNoteForm, setShowNoteForm] = useState(false);
            const [toast, setToast] = useState('');

            // CRM 表單狀態
            const [newNote, setNewNote] = useState({
                id: '', clientName: '', date: new Date().toISOString().split('T')[0],
                stage: '初次拜訪', commission: '', requiredDocs: '', contractTerms: '', extraNotes: ''
            });

            // 彰化老人之家模擬監控數據
            const [bedsData, setBedsData] = useState([
                { id: '332-1', status: '正常', temp: '36.5°C', humidity: '45%', position: '平躺', duration: '45分' },
                { id: '332-2', status: '久臥警報', temp: '37.1°C', humidity: '55%', position: '右翻拍背', duration: '125分' },
                { id: '332-3', status: '正常', temp: '36.2°C', humidity: '42%', position: '左翻拍背', duration: '10分' },
                { id: '332-5', status: '排泄處理中', temp: '36.8°C', humidity: '68%', position: '平躺', duration: '2分' },
                { id: '331-2', status: '離床警報', temp: '---', humidity: '---', position: '未偵測', duration: '---' }
            ]);

            useEffect(() => {
                // 初始化一筆彰化老人之家臨床實測紀錄
                setNotes([{
                    id: '1',
                    clientName: '彰化老人之家 (指標4場域驗證專案)',
                    date: '2026-06-01',
                    stage: '簽約結案',
                    commission: '專案補助專款，無額外讓利',
                    requiredDocs: 'NCC型式認證 (SL-CWF08P)、SGS防火檢驗、新光產物保單影本',
                    contractTerms: '已導入40多床，長期驗證實測，無痛升級智慧化。',
                    extraNotes: '設備良率維持在 90.1% 穩定運作，人為照護失誤大幅度下降，配合指標4順利對接ERP。'
                }]);

                // 模擬監控跳動
                const interval = setInterval(() => {
                    setBedsData(prev => prev.map(bed => {
                        if (bed.id === '332-5') {
                            return { ...bed, temp: (36.2 + Math.random() * 0.8).toFixed(1) + '°C' };
                        }
                        return bed;
                    }));
                }, 4000);
                return () => clearInterval(interval);
            }, []);

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(''), 3000);
            };

            // 經銷商分潤試算邏輯 (30% 通路利潤池：北區代理10%, 分銷20%；原廠70%運維)
            const { totalRevenue, myProfit, subDistProfit, profitPool, agentBonus, isValid } = useMemo(() => {
                const b = Math.max(0, Number(beds) || 0);
                let unitPrice = 0;

                if (calcMode === 'lease') {
                    const model = LEASE_MODELS.find(m => m.id === selectedModel);
                    unitPrice = model ? model.price : 0;
                } else {
                    unitPrice = Math.max(0, Number(buyoutPrice) || 0);
                }

                const addonCost = selectedAddons.reduce((sum, id) => {
                    const add = ADDON_OPTIONS.find(a => a.id === id);
                    return sum + (add ? add.price : 0);
                }, 0);

                const rev = unitPrice * b;
                const my = rev * 0.1;
                const sub = rev * 0.2;
                const bonus = addonCost * b;
                const ok = unitPrice > 0 && b > 0;

                return {
                    totalRevenue: rev,
                    myProfit: my,
                    subDistProfit: sub,
                    profitPool: my + sub,
                    agentBonus: bonus,
                    isValid: ok
                };
            }, [calcMode, selectedModel, buyoutPrice, beds, selectedAddons]);

            const fmt = (n) => `NT$ ${Number(n).toLocaleString('en-US')}`;

            // CRM 核心操作
            const handleSaveNote = () => {
                if (!newNote.clientName) { showToast('請輸入客戶/機構名稱'); return; }
                setNotes(prev => [{ ...newNote, id: Date.now().toString() }, ...prev]);
                setNewNote({
                    id: '', clientName: '', date: new Date().toISOString().split('T')[0],
                    stage: '初次拜訪', commission: '', requiredDocs: '', contractTerms: '', extraNotes: ''
                });
                setShowNoteForm(false);
                showToast('拜訪談判歷程已儲存至 CRM 系統');
            };

            const handleDeleteNote = (id) => {
                setNotes(prev => prev.filter(n => n.id !== id));
                showToast('紀錄已從系統中移除');
            };

            const handleExport = () => {
                const a = document.createElement('a');
                a.href = 'data:text/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(notes, null, 2));
                a.download = `Shuoxiang_CRM_${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                showToast('已成功下載本機 JSON 備份檔');
            };

            const handleImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const imported = JSON.parse(evt.target.result);
                        if (Array.isArray(imported)) {
                            setNotes(prev => {
                                const merged = [...imported, ...prev];
                                return merged.filter((v, i, a) => a.findIndex(t => t.id === v.id) === i);
                            });
                            showToast(`成功讀取並匯入 ${imported.length} 筆歷史紀錄`);
                        } else { showToast('檔案格式不正確！'); }
                    } catch { showToast('讀取失敗，請確認檔案格式'); }
                };
                reader.readAsText(file);
                e.target.value = '';
            };

            return (
                <div className="flex h-screen bg-slate-50 font-sans overflow-hidden">
                    
                    {/* 左側精簡導覽列 - 永不消失，極佳的 iframe 相容性 */}
                    <aside className="w-[72px] bg-slate-900 flex flex-col items-center py-6 text-slate-300 shrink-0 border-r border-slate-800">
                        <div className="mb-8 cursor-pointer" onClick={() => setActiveTab('home')}>
                            <span className="w-10 h-10 bg-sky-500/10 rounded-xl flex items-center justify-center border border-sky-500/20 text-sky-400 font-bold text-sm">碩享</span>
                        </div>

                        <div className="flex-1 w-full flex flex-col gap-4 px-2">
                            {[
                                { id: 'home', icon: Icons.Home, label: '首頁' },
                                { id: 'products', icon: Icons.Package, label: '產品' },
                                { id: 'calculator', icon: Icons.Calculator, label: '試算' },
                                { id: 'notes', icon: Icons.CRM, label: 'CRM' },
                                { id: 'device', icon: Icons.Monitor, label: '監控' }
                            ].map(item => (
                                <button
                                    key={item.id}
                                    onClick={() => setActiveTab(item.id)}
                                    className={`flex flex-col items-center py-3 rounded-xl transition-all ${
                                        activeTab === item.id ? 'bg-sky-500 text-white shadow-lg shadow-sky-500/30' : 'text-slate-400 hover:text-white hover:bg-slate-800'
                                    }`}
                                >
                                    <item.icon />
                                    <span className="text-[9px] mt-1.5 font-bold">{item.label}</span>
                                </button>
                            ))}
                        </div>

                        <div className="mt-auto flex flex-col items-center gap-3">
                            <span className="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse" title="系統連線中" />
                            <span className="text-[9px] text-slate-500 font-bold">V1.3</span>
                        </div>
                    </aside>

                    {/* 主內容區 */}
                    <div className="flex-1 flex flex-col min-w-0 overflow-y-auto">
                        
                        {/* ════ 首頁 (HOME) ════ */}
                        {activeTab === 'home' && (
                            <div className="pb-12">
                                <div className="bg-slate-900 px-6 py-10 text-white relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-80 h-80 bg-sky-500/10 rounded-full blur-3xl pointer-events-none" />
                                    <div className="max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-start md:items-center gap-6 relative z-10">
                                        <div>
                                            <div className="flex items-center gap-2 mb-2">
                                                <span className="bg-sky-500/20 text-sky-300 text-xs px-2.5 py-1 rounded-full font-bold border border-sky-500/30">台灣北區總代理</span>
                                            </div>
                                            <h1 className="text-3xl font-bold mb-1">歡迎回來，王總監</h1>
                                            <p className="text-slate-400 text-sm">結合行動/移動/照護/排泄感知，實現四合一智慧聯網全方位照護系統。</p>
                                        </div>
                                        <div className="bg-slate-800/80 border border-slate-700 p-5 rounded-2xl shrink-0 text-right">
                                            <p className="text-xs text-sky-400 mb-1 font-bold">🛡️ 已投保新光產物產品責任險</p>
                                            <h2 className="text-2xl font-bold text-white tracking-tight">NT$ 24,000,000 元</h2>
                                            <p className="text-[10px] text-slate-500 mt-1">保單字號：130214AKP0000757</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="px-6 py-8 grid grid-cols-1 md:grid-cols-3 gap-6 max-w-5xl mx-auto">
                                    {[
                                        { icon: Icons.UserMinus, color: 'text-orange-500', bg: 'bg-orange-50', title: '1. 徹底降低照護勞力', desc: '8種情境智能翻身與免換尿布系統，省去定時手動翻身拍背與清理排泄重度勞力，讓照護工作更體面。' },
                                        { icon: Icons.TrendingDown, color: 'text-emerald-600', bg: 'bg-emerald-50', title: '2. 降低照護消耗成本', desc: '拋棄式尿布消耗歸零、減少護理人員職場拉傷、降低人員離職率，替機構省下龐大招募與訓練隱形成本。' },
                                        { icon: Icons.CircleDollarSign, color: 'text-blue-600', bg: 'bg-blue-50', title: '3. 對接長照品質獎勵', desc: '離床、久臥、大小便自動記錄傳輸，完美符合住宿機構照顧品質獎勵計畫之「指標4-智慧輔助」補助申請。' },
                                    ].map((c, i) => (
                                        <div key={i} className="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 hover:shadow-md transition-all">
                                            <div className={`w-12 h-12 ${c.bg} ${c.color} rounded-xl flex items-center justify-center mb-4`}>
                                                <c.icon />
                                            </div>
                                            <h4 className="font-bold text-slate-800 mb-2 text-base">{c.title}</h4>
                                            <p className="text-xs text-slate-500 leading-relaxed">{c.desc}</p>
                                        </div>
                                    ))}
                                </div>

                                <div className="px-6 max-w-5xl mx-auto mb-8">
                                    <div className="bg-white rounded-3xl p-6 border border-slate-200 shadow-sm">
                                        <div className="flex items-center gap-2 mb-4">
                                            <span className="p-1.5 bg-emerald-50 rounded-lg text-emerald-600"><Icons.Home /></span>
                                            <h3 className="font-bold text-slate-800 text-base">臨床場域實測良率看板</h3>
                                        </div>
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                            <div className="bg-slate-50 p-4 rounded-xl text-center">
                                                <p className="text-xs text-slate-400">場域合作機構</p>
                                                <p className="text-base font-bold text-slate-800 mt-1">彰化老人之家</p>
                                            </div>
                                            <div className="bg-slate-50 p-4 rounded-xl text-center">
                                                <p className="text-xs text-slate-400">長期驗證運作床數</p>
                                                <p className="text-base font-bold text-sky-600 mt-1">40 多床已啟用</p>
                                            </div>
                                            <div className="bg-slate-50 p-4 rounded-xl text-center">
                                                <p className="text-xs text-slate-400">設備妥善良率</p>
                                                <p className="text-base font-bold text-emerald-600 mt-1">90.1% 正確運作</p>
                                            </div>
                                            <div className="bg-slate-50 p-4 rounded-xl text-center">
                                                <p className="text-xs text-slate-400">人為失誤降低率</p>
                                                <p className="text-base font-bold text-orange-500 mt-1">平均改善 25.1%</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ════ 產品規格 (PRODUCTS) ════ */}
                        {activeTab === 'products' && (
                            <div className="p-6 md:p-8 max-w-5xl mx-auto pb-12">
                                <h2 className="text-2xl font-bold text-slate-800 flex items-center mb-2">
                                    <Icons.Package /> <span className="ml-2">產品功能與規格目錄</span>
                                </h2>
                                <p className="text-slate-500 text-sm mb-6">對應官方認證與精品獎獲獎功能（2025 排泄沐浴類精品獎），最精準的客戶提案參考資料。</p>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    <div className="lg:col-span-2 space-y-6">
                                        <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                                            <h3 className="font-bold text-base text-slate-800 mb-4 pb-2 border-b">1. 8種情境模式翻身系統</h3>
                                            <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 text-center">
                                                {['左翻拍背', '右翻拍背', '抽痰餵水', '抬背餵食', '舒活減壓', '尿布更換', '抬腿修甲', '零壓坐姿'].map((item, idx) => (
                                                    <div key={idx} className="bg-sky-50/50 border border-sky-100 p-2.5 rounded-xl text-xs font-bold text-sky-800">
                                                        {item}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                                            <h3 className="font-bold text-base text-slate-800 mb-3 pb-2 border-b">2. AIOT全自動排泄處理流程</h3>
                                            <div className="flex flex-col sm:flex-row justify-between items-center gap-3 py-2">

                                  <div key={bed.id} className={`p-5 rounded-2xl border transition-all ${
                                    isAlert ? 'bg-red-50 border-red-200' : isProcessing ? 'bg-amber-50 border-amber-200' : 'bg-white border-slate-200'
                                  }`}>
                                    <div className="flex justify-between items-center mb-3">
                                      <span className="font-bold text-slate-800 text-lg">床位：{bed.id}</span>
                                      <span className={`px-2 py-0.5 rounded-full text-xs font-bold ${
                                        isAlert ? 'bg-red-100 text-red-700' : isProcessing ? 'bg-amber-100 text-amber-700' : 'bg-emerald-100 text-emerald-700'
                                      }`}>{bed.status}</span>
                                    </div>
                                    <div className="space-y-1.5 text-xs text-slate-600">
                                      <div className="flex justify-between"><span>床面濕度</span><span className="font-bold">{bed.humidity}</span></div>
                                      <div className="flex justify-between"><span>當前體位姿勢</span><span className="font-bold text-sky-600">{bed.position}</span></div>
                                      <div className="flex justify-between"><span>當前體位持續時間</span><span className="font-bold text-amber-600">{bed.duration}</span></div>
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        )}

                        {/* ════ 我的帳戶 (PROFILE) ════ */}
                        {activeTab === 'profile' && (
                          <div className="p-6 md:p-8 max-w-2xl mx-auto pb-12">
                            <div className="bg-white rounded-3xl p-8 border border-slate-200 shadow-sm text-center">
                              <div className="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4 border-2 border-slate-200">
                                <span className="text-2xl font-bold text-slate-600">王</span>
                              </div>
                              <h3 className="text-xl font-bold text-slate-800">王總監</h3>
                              <p className="text-slate-400 text-sm mt-1">北區銷售與總代理授權負責人</p>
                              <div className="mt-6 pt-6 border-t space-y-3 text-left text-sm max-w-sm mx-auto">
                                <div className="flex justify-between"><span>授權經銷區域</span><span className="font-bold">台灣北區全域</span></div>
                                <div className="flex justify-between"><span>經銷商授權等級</span><span className="font-bold text-sky-600">A級 特級經銷商</span></div>
                                <div className="flex justify-between"><span>本月分潤核算狀態</span><span className="font-bold text-emerald-600">已核撥</span></div>
                              </div>
                            </div>
                          </div>
                        )}

                      </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
